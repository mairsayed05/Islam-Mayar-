<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Islam & Mayar Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#f5efe6,#e8dccf);
  font-family:'Inter',sans-serif;
}

.container{
  text-align:center;
}

.title{
  font-family:'Playfair Display',serif;
  font-size:32px;
  margin-bottom:20px;
  color:#3b2e2e;
}

.envelope{
  width:260px;
  height:180px;
  background:#fff;
  position:relative;
  margin:auto;
  cursor:pointer;
  border-radius:8px;
  box-shadow:0 20px 40px rgba(0,0,0,0.1);
  transition:0.5s;
}

.envelope:before{
  content:'';
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#f3e9dc;
  clip-path:polygon(0 0,50% 60%,100% 0);
  transition:0.5s;
}

.letter{
  position:absolute;
  width:90%;
  height:130px;
  background:white;
  left:5%;
  bottom:0;
  border-radius:6px;
  text-align:center;
  padding-top:15px;
  font-family:'Playfair Display';
  font-size:18px;
  transform:translateY(100%);
  transition:0.6s;
}

.open .letter{
  transform:translateY(-60px);
}

.open:before{
  transform:rotateX(180deg);
}

.gold{
  width:40px;
  height:40px;
  background:gold;
  border-radius:50%;
  position:absolute;
  bottom:-20px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
}

.names{
  margin-top:20px;
  font-size:22px;
  font-family:'Playfair Display';
}

.date{
  font-size:14px;
  margin-top:10px;
}

</style>
</head>

<body>

<div class="container">
  <div class="title">Come Celebrate With Us</div>

  <div class="envelope" onclick="openInvite(this)">
    <div class="letter">
      <div class="names">Islam & Mayar</div>
      <div class="date">June 2, 2026</div>
    </div>
    <div class="gold">IM</div>
  </div>
</div>

<script>
function openInvite(el){
  el.classList.toggle("open");
}
</script>

</body>
</html>
