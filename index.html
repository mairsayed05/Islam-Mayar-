<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Islam & Mayar Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#f6f1ea;
  --gold:#ba9b73;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  overflow-x:hidden;
}

/* ================= COVER ================= */
#cover{
  position:fixed;
  inset:0;
  background:linear-gradient(rgba(0,0,0,.25),rgba(0,0,0,.25)),
             url("https://images.unsplash.com/photo-1522673607200-164d1b6ce486?q=80&w=2000");
  background-size:cover;
  background-position:center;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  color:#fff;
  z-index:999;
  text-align:center;
  transition:1.2s ease;
}

#cover.hidden{
  opacity:0;
  visibility:hidden;
}

.cover-title{
  font-family:'Playfair Display', serif;
  font-size:42px;
  margin-bottom:20px;
}

.seal{
  width:90px;
  height:90px;
  border-radius:50%;
  background:var(--gold);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  letter-spacing:3px;
  cursor:pointer;
  box-shadow:0 10px 40px rgba(0,0,0,.3);
  animation:pulse 2s infinite;
}

@keyframes pulse{
  0%{transform:scale(1)}
  50%{transform:scale(1.1)}
  100%{transform:scale(1)}
}

.tap{
  margin-top:20px;
  font-size:14px;
  opacity:.8;
}

/* ================= MAIN ================= */
#main{
  opacity:0;
  transform:translateY(40px);
  transition:1s ease;
}

#main.show{
  opacity:1;
  transform:none;
}

/* SECTION */
.section{
  padding:60px 20px;
  text-align:center;
  max-width:900px;
  margin:auto;
}

h1{
  font-family:'Playfair Display', serif;
  font-size:36px;
}

.sub{
  margin-top:10px;
  color:#777;
}

/* COUNTDOWN */
.count{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:30px;
}

.box{
  background:#fff;
  padding:15px;
  border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,.1);
}

.num{
  font-size:22px;
  font-weight:bold;
}

/* PARALLAX */
.parallax{
  background:url("https://images.unsplash.com/photo-1519741497674-611481863552?q=80&w=2000") center/cover fixed;
  height:300px;
  border-radius:20px;
  margin:40px 0;
}

/* ANIMATION */
.fade{
  opacity:0;
  transform:translateY(40px);
  transition:1s;
}
.fade.show{
  opacity:1;
  transform:none;
}

</style>
</head>

<body>

<!-- COVER -->
<div id="cover">
  <div class="cover-title">Islam & Mayar</div>

  <div class="seal" onclick="openInvite()">I&M</div>

  <div class="tap">Tap to Open</div>
</div>

<!-- MAIN -->
<div id="main">

<div class="section fade">
  <h1 id="guest">Welcome</h1>
  <div class="sub">You are invited to celebrate with us</div>
</div>

<div class="section fade">
  <h1>2 June 2026</h1>

  <div class="count">
    <div class="box"><div id="d" class="num">00</div>Days</div>
    <div class="box"><div id="h" class="num">00</div>Hours</div>
    <div class="box"><div id="m" class="num">00</div>Minutes</div>
    <div class="box"><div id="s" class="num">00</div>Seconds</div>
  </div>
</div>

<div class="section fade">
  <h1>Location</h1>
  <div class="sub">Jewel Sport City Resort - Treasure Hall</div>
</div>

<div class="parallax"></div>

</div>

<!-- AUDIO -->
<audio id="music" src="music.mp3"></audio>
<audio id="click" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8d68c1b63.mp3"></audio>

<script>

/* OPEN */
function openInvite(){
  document.getElementById("click").play();

  const music = document.getElementById("music");
  music.volume = 0;
  music.play();

  let v=0;
  const fade = setInterval(()=>{
    if(v>=1) clearInterval(fade);
    music.volume = v;
    v+=0.05;
  },200);

  document.getElementById("cover").classList.add("hidden");

  setTimeout(()=>{
    document.getElementById("main").classList.add("show");
  },400);
}

/* GUEST NAME */
const params = new URLSearchParams(window.location.search);
const guest = params.get("guest");

if(guest){
  document.getElementById("guest").innerText = "Welcome " + guest;
}

/* COUNTDOWN */
const target = new Date("2026-06-02T19:00:00").getTime();

function update(){
  const now = new Date().getTime();
  const diff = target - now;

  const d = Math.floor(diff/(1000*60*60*24));
  const h = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
  const m = Math.floor((diff%(1000*60*60))/(1000*60));
  const s = Math.floor((diff%(1000*60))/1000);

  document.getElementById("d").innerText=d;
  document.getElementById("h").innerText=h;
  document.getElementById("m").innerText=m;
  document.getElementById("s").innerText=s;
}
setInterval(update,1000);

/* SCROLL ANIMATION */
const els = document.querySelectorAll(".fade");

window.addEventListener("scroll", ()=>{
  els.forEach(el=>{
    const top = el.getBoundingClientRect().top;
    if(top < window.innerHeight-100){
      el.classList.add("show");
    }
  });
});

</script>

</body>
</html>
