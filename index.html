<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Islam & Mayar Wedding</title><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet"><style>
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:#f4efe8;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  text-align:center;
}

.envelope{
  width:260px;
  height:180px;
  background:#e6dccf;
  position:relative;
  border-radius:10px;
  cursor:pointer;
  transition:0.5s;
}

.flap{
  position:absolute;
  width:100%;
  height:100%;
  background:#d8cbb7;
  clip-path:polygon(0 0,100% 0,50% 50%);
  transition:0.6s;
}

.open .flap{
  transform:rotateX(180deg);
}

.card{
  position:absolute;
  top:20px;
  left:10px;
  width:240px;
  height:140px;
  background:white;
  border-radius:10px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  opacity:0;
  transform:translateY(20px);
  transition:0.5s;
}

.open .card{
  opacity:1;
  transform:translateY(0);
}

img{
  width:100px;
  border-radius:50%;
  margin-bottom:10px;
}

h1{
  font-family:'Playfair Display',serif;
  margin:5px;
}

.countdown{
  margin-top:20px;
  font-size:18px;
}

button{
  margin-top:15px;
  padding:10px 20px;
  border:none;
  background:#c9a96e;
  color:white;
  border-radius:20px;
  cursor:pointer;
}
</style></head><body><div class="container">
  <div class="envelope" id="env" onclick="openCard()">
    <div class="flap"></div><div class="card">
  <img src="couple.jpg">
  <h1>Islam & Mayar</h1>
  <p>June 2, 2026</p>

  <div class="countdown" id="countdown"></div>

  <button onclick="sendRSVP(event)">RSVP</button>
</div>

  </div>
</div><audio id="music" src="music.mp3"></audio>

<script>
function openCard(){
  document.getElementById("env").classList.toggle("open");
  document.getElementById("music").play();
}

function sendRSVP(e){
  e.stopPropagation();
  window.location.href="mailto:mkadyweddingplanner@gmail.com?subject=RSVP";
}

const targetDate = new Date("June 2, 2026 19:00:00").getTime();

setInterval(()=>{
  let now = new Date().getTime();
  let diff = targetDate - now;

  let d = Math.floor(diff/(1000*60*60*24));
  let h = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
  let m = Math.floor((diff%(1000*60*60))/(1000*60));
  let s = Math.floor((diff%(1000*60))/1000);

  document.getElementById("countdown").innerHTML =
    d+"d "+h+"h "+m+"m "+s+"s";
},1000);
</script></body>
</html>
