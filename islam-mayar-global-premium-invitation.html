<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Islam & Mayar | Wedding Invitation</title>
  <meta name="description" content="A luxury wedding invitation for Islam & Mayar." />
  <meta name="theme-color" content="#e8ddd0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Great+Vibes&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#f2ebe2;
      --bg-2:#e7dbcd;
      --paper:#fcf8f2;
      --paper-2:#f4ecdf;
      --paper-3:#efe4d4;
      --ink:#211a15;
      --muted:#7b6d61;
      --gold:#b9976d;
      --gold-2:#d0b38c;
      --gold-3:#8b6a47;
      --line:rgba(118,92,58,.14);
      --shadow:0 30px 90px rgba(60,42,22,.14);
      --soft-shadow:0 14px 34px rgba(60,42,22,.08);
      --radius:32px;
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      min-height:100vh;
      color:var(--ink);
      font-family:"Inter",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:
        radial-gradient(circle at 18% 10%, rgba(255,255,255,.5), transparent 24%),
        radial-gradient(circle at 84% 16%, rgba(255,255,255,.28), transparent 18%),
        linear-gradient(180deg, #f4efe8 0%, #e8ded1 100%);
      overflow-x:hidden;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background-image:
        radial-gradient(rgba(180,156,122,.10) .8px, transparent .8px),
        radial-gradient(ellipse at center, rgba(255,255,255,.14), transparent 70%);
      background-size:18px 18px, auto;
      opacity:.22;
      mix-blend-mode:multiply;
    }

    .ambient{
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:0;
      opacity:.18;
      background:
        radial-gradient(ellipse at 8% 18%, rgba(169,142,107,.24), transparent 18%),
        radial-gradient(ellipse at 90% 18%, rgba(169,142,107,.18), transparent 14%),
        radial-gradient(ellipse at 12% 84%, rgba(169,142,107,.2), transparent 16%),
        radial-gradient(ellipse at 88% 88%, rgba(169,142,107,.16), transparent 13%);
      filter:blur(18px);
    }

    .page{
      width:min(100%, 620px);
      margin:0 auto;
      padding:16px 14px 90px;
      position:relative;
      z-index:1;
    }

    .hero{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      perspective:1800px;
    }

    .shell{
      width:100%;
      max-width:500px;
      position:relative;
    }

    .cover{
      min-height:calc(100vh - 32px);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      transition:opacity .7s ease, transform .9s ease;
    }

    .cover.hidden{
      opacity:0;
      pointer-events:none;
      transform:translateY(-24px);
      position:absolute;
      inset:0;
    }

    .ornament{
      width:180px;
      height:28px;
      position:relative;
      margin-bottom:18px;
    }

    .ornament::before,.ornament::after{
      content:"";
      position:absolute;
      left:0; right:0; top:50%;
      height:1px;
      transform:translateY(-50%);
      background:linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    .ornament span{
      position:absolute;
      inset:0;
      display:grid;
      place-items:center;
      color:var(--gold);
      letter-spacing:6px;
      font-size:20px;
    }

    .eyebrow{
      margin:0 0 12px;
      font-family:"Cormorant Garamond",serif;
      font-size:clamp(2rem, 6vw, 3rem);
      font-weight:600;
      letter-spacing:.02em;
      color:#3f3127;
    }

    .guest-chip{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 16px;
      border-radius:999px;
      background:rgba(255,255,255,.4);
      border:1px solid rgba(118,92,58,.12);
      color:#6f5f4f;
      font-size:.9rem;
      letter-spacing:.12em;
      text-transform:uppercase;
      margin-bottom:18px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .tap-note{
      margin:22px 0 0;
      font-family:"Cormorant Garamond",serif;
      font-size:clamp(1.2rem, 4vw, 1.55rem);
      text-transform:uppercase;
      letter-spacing:.12em;
      color:#4f4032;
    }

    .sub-note{
      margin:8px 0 0;
      color:#87776b;
      font-size:.95rem;
    }

    .envelope-wrap{
      width:min(100%, 465px);
      margin-top:8px;
      position:relative;
    }

    .envelope{
      width:100%;
      aspect-ratio:1.38/1;
      position:relative;
      cursor:pointer;
      transform-style:preserve-3d;
      outline:none;
      filter:drop-shadow(0 22px 36px rgba(60,42,22,.14));
      transition:transform .35s ease;
    }

    .envelope:hover{ transform:translateY(-2px) }
    .env-back,.env-front,.env-flap,.seal,.preview-card{
      position:absolute;
      inset:0;
      border-radius:10px;
    }

    .env-back{
      border:1px solid rgba(96,75,49,.11);
      background:
        linear-gradient(180deg, rgba(255,255,255,.24), transparent 18%),
        linear-gradient(180deg, #eee5da 0%, #e2d6c7 100%);
      overflow:hidden;
    }

    .env-back::before,.env-back::after{
      content:"";
      position:absolute;
      width:190px;
      height:190px;
      border-radius:50%;
      opacity:.14;
      background:radial-gradient(circle at center, rgba(185,151,109,.24), transparent 64%);
    }
    .env-back::before{ top:-35px; left:-30px }
    .env-back::after{ right:-30px; bottom:-45px }

    .preview-card{
      inset:16px 22px 18px;
      z-index:1;
      overflow:hidden;
      border:1px solid rgba(96,75,49,.09);
      background:linear-gradient(180deg, #fdfaf5 0%, #f3ebdf 100%);
      box-shadow:0 12px 26px rgba(60,42,22,.08);
      transform:translateY(82px);
      transition:transform 1.1s cubic-bezier(.2,.8,.2,1);
    }

    .preview-photo{
      position:absolute;
      inset:0;
      background:
        linear-gradient(180deg, rgba(255,255,255,.08), rgba(0,0,0,.04)),
        url('couple.jpg') center/cover no-repeat;
      clip-path:polygon(50% 0, 100% 38%, 74% 100%, 26% 100%, 0 38%);
      filter:saturate(.92) brightness(1.02);
    }

    .env-front{
      z-index:3;
      overflow:hidden;
      border:1px solid rgba(96,75,49,.08);
      background:linear-gradient(180deg, #f6f0e7 0%, #e7dccf 100%);
      clip-path:polygon(0 0, 100% 0, 100% 100%, 0 100%, 0 0, 50% 62%, 100% 0);
    }

    .env-front::before,.env-front::after{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(135deg, transparent 49.3%, rgba(96,75,49,.09) 49.8%, transparent 50.3%);
      opacity:.92;
    }
    .env-front::after{ transform:scaleX(-1) }

    .env-flap{
      z-index:5;
      border:1px solid rgba(96,75,49,.10);
      transform-origin:top center;
      backface-visibility:hidden;
      overflow:hidden;
      background:
        linear-gradient(180deg, rgba(255,255,255,.2), transparent 14%),
        linear-gradient(180deg, #ece2d7 0%, #dfd1bf 100%);
      clip-path:polygon(0 0, 100% 0, 50% 72%);
      transition:transform 1.05s cubic-bezier(.2,.8,.2,1), z-index .5s ease;
    }

    .env-flap::before,.env-flap::after{
      content:"";
      position:absolute;
      width:180px;
      height:180px;
      background:radial-gradient(circle at center, rgba(185,151,109,.18), transparent 64%);
      opacity:.12;
      filter:blur(4px);
    }
    .env-flap::before{ left:-34px; top:-26px }
    .env-flap::after{ right:-40px; top:-6px }

    .seal{
      inset:auto;
      width:66px;
      height:66px;
      left:50%;
      bottom:48px;
      transform:translateX(-50%);
      border-radius:50%;
      z-index:6;
      display:grid;
      place-items:center;
      background:radial-gradient(circle at 30% 28%, #e1c08f, #b9976d 66%, #987452 100%);
      box-shadow: inset 0 2px 6px rgba(255,255,255,.22), 0 12px 20px rgba(60,42,22,.18);
      transition:opacity .38s ease, transform .38s ease;
    }

    .seal::before{
      content:"IM";
      width:46px;
      height:46px;
      border-radius:50%;
      display:grid;
      place-items:center;
      border:1px solid rgba(255,255,255,.34);
      color:#fffaf2;
      font-family:"Cormorant Garamond",serif;
      font-size:30px;
      letter-spacing:.02em;
      text-shadow:0 1px 2px rgba(0,0,0,.08);
    }

    .envelope.open .env-flap{
      transform:rotateX(180deg);
      z-index:0;
    }

    .envelope.open .preview-card{
      transform:translateY(-98px);
    }

    .envelope.open .seal{
      opacity:0;
      transform:translateX(-50%) translateY(-18px) scale(.86);
    }

    .panel{
      margin-top:24px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.42), transparent 16%),
        linear-gradient(180deg, rgba(251,247,240,.94), rgba(244,236,226,.98));
      border:1px solid rgba(96,75,49,.10);
      border-radius:0 0 32px 32px;
      box-shadow:var(--shadow);
      overflow:hidden;
      opacity:0;
      max-height:0;
      transform:translateY(26px);
      transition:max-height 1.2s ease, opacity .9s ease, transform .9s ease;
    }

    .panel.show{
      opacity:1;
      max-height:3200px;
      transform:translateY(0);
    }

    .paper{
      position:relative;
      padding:24px 18px 30px;
      overflow:hidden;
    }

    .paper::before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        radial-gradient(circle at 50% 0, rgba(255,255,255,.54), transparent 28%),
        linear-gradient(180deg, rgba(255,255,255,.16), transparent 18%);
    }

    .frame{
      position:relative;
      border:1px solid rgba(185,151,109,.3);
      border-radius:26px;
      padding:18px 14px 22px;
    }

    .frame::before,.frame::after{
      content:"";
      position:absolute;
      width:14px;
      height:14px;
      left:calc(50% - 7px);
      border:1px solid rgba(185,151,109,.34);
      background:#fbf5ec;
      transform:rotate(45deg);
    }
    .frame::before{ top:-7px }
    .frame::after{ bottom:-7px }

    .reveal{
      opacity:0;
      transform:translateY(18px);
      transition:opacity .8s ease, transform .8s ease;
    }

    .reveal.show{
      opacity:1;
      transform:translateY(0);
    }

    .family-line{
      text-align:center;
      color:#6e5f4f;
      font-family:"Cormorant Garamond",serif;
      font-size:clamp(1rem, 3vw, 1.18rem);
      letter-spacing:.14em;
      text-transform:uppercase;
    }

    .names{
      text-align:center;
      margin-top:10px;
    }

    .names .script{
      font-family:"Great Vibes",cursive;
      font-size:clamp(3.8rem, 12vw, 5.4rem);
      line-height:.94;
      color:#a88355;
      text-shadow:0 1px 0 rgba(255,255,255,.38);
    }

    .copy{
      text-align:center;
      max-width:90%;
      margin:10px auto 16px;
      font-family:"Cormorant Garamond",serif;
      font-size:clamp(1.24rem, 4.4vw, 1.6rem);
      line-height:1.35;
      color:#4a3b2e;
    }

    .hero-photo{
      width:100%;
      aspect-ratio:1 / 1.06;
      border-radius:24px;
      overflow:hidden;
      box-shadow:var(--soft-shadow);
      position:relative;
      margin:0 auto 18px;
    }

    .hero-photo img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      filter:saturate(.94) brightness(1.01);
      transform:scale(1.02);
    }

    .hero-photo::after{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:linear-gradient(180deg, rgba(255,255,255,.09), rgba(255,255,255,0) 28%, rgba(255,255,255,.10) 100%);
    }

    .details{
      display:grid;
      grid-template-columns:repeat(3, 1fr);
      gap:10px;
      margin:4px 0 10px;
    }

    .detail{
      text-align:center;
      padding:10px 6px 8px;
      position:relative;
    }

    .detail:not(:last-child)::after{
      content:"";
      position:absolute;
      top:15%;
      left:100%;
      width:1px;
      height:70%;
      background:rgba(185,151,109,.26);
    }

    .detail-icon{
      width:48px;
      height:48px;
      margin:0 auto 8px;
      border-radius:50%;
      border:1px solid rgba(185,151,109,.42);
      display:grid;
      place-items:center;
      color:#a28159;
      background:rgba(255,255,255,.34);
      font-family:"Cormorant Garamond",serif;
      font-size:21px;
    }

    .detail-main{
      font-family:"Cormorant Garamond",serif;
      font-size:clamp(1rem, 3vw, 1.18rem);
      line-height:1.25;
      text-transform:uppercase;
      letter-spacing:.04em;
      color:#493b2f;
    }

    .detail-sub{
      margin-top:4px;
      font-family:"Cormorant Garamond",serif;
      font-size:clamp(1rem, 3vw, 1.14rem);
      text-transform:uppercase;
      color:#70614f;
      line-height:1.2;
    }

    .divider{
      width:126px;
      height:22px;
      margin:12px auto 12px;
      position:relative;
    }

    .divider::before{
      content:"";
      position:absolute;
      left:0; right:0; top:50%;
      height:1px;
      background:linear-gradient(90deg, transparent, rgba(185,151,109,.72), transparent);
      transform:translateY(-50%);
    }

    .divider span{
      position:absolute;
      inset:0;
      display:grid;
      place-items:center;
      color:var(--gold);
      font-size:18px;
    }

    .btns{
      display:grid;
      gap:12px;
      margin-top:4px;
    }

    .btn{
      appearance:none;
      border:none;
      text-decoration:none;
      cursor:pointer;
      border-radius:999px;
      padding:15px 18px;
      font-family:"Inter",sans-serif;
      font-size:14px;
      font-weight:600;
      text-align:center;
      text-transform:uppercase;
      letter-spacing:.12em;
      transition:transform .24s ease, box-shadow .24s ease, background .24s ease;
    }

    .btn:hover{ transform:translateY(-1px) }

    .btn-gold{
      color:#fffdf9;
      background:linear-gradient(180deg, var(--gold-2), var(--gold));
      box-shadow:0 14px 24px rgba(98,78,53,.15);
    }

    .btn-soft{
      color:#5f4d3b;
      background:rgba(255,255,255,.52);
      border:1px solid rgba(185,151,109,.32);
    }

    .music{
      margin-top:18px;
      border:1px solid rgba(185,151,109,.24);
      border-radius:22px;
      background:rgba(255,255,255,.38);
      padding:14px;
      display:flex;
      align-items:center;
      gap:12px;
    }

    .play-btn{
      width:50px;
      height:50px;
      border:none;
      border-radius:50%;
      background:linear-gradient(180deg, rgba(255,255,255,.8), rgba(248,240,228,.92));
      border:1px solid rgba(185,151,109,.4);
      color:#8e724d;
      font-size:18px;
      cursor:pointer;
      flex:0 0 50px;
    }

    .track{
      flex:1;
      min-width:0;
    }

    .track-title{
      font-family:"Cormorant Garamond",serif;
      color:#4c3d30;
      font-size:1.28rem;
      margin-bottom:2px;
    }

    .track-sub{
      color:#87796d;
      font-size:.92rem;
      margin-bottom:10px;
    }

    .progress{
      width:100%;
      height:3px;
      border-radius:999px;
      background:rgba(185,151,109,.22);
      overflow:hidden;
      position:relative;
    }

    .progress-fill{
      position:absolute;
      top:0; left:0; bottom:0;
      width:0%;
      background:linear-gradient(90deg, #d4bb97, #b9976d);
      border-radius:999px;
    }

    .volume{
      width:42px;
      height:42px;
      border:none;
      border-radius:50%;
      background:rgba(255,255,255,.58);
      color:#9b805d;
      font-size:16px;
      cursor:pointer;
      flex:0 0 42px;
    }

    .countdown{
      margin-top:18px;
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:10px;
    }

    .count{
      text-align:center;
      padding:14px 8px 12px;
      border-radius:22px;
      background:rgba(255,255,255,.46);
      border:1px solid rgba(185,151,109,.18);
    }

    .count-num{
      font-family:"Cormorant Garamond",serif;
      font-size:clamp(2rem, 6vw, 2.6rem);
      line-height:1;
      font-weight:700;
      color:#4a3b2e;
    }

    .count-label{
      margin-top:6px;
      font-size:.74rem;
      text-transform:uppercase;
      letter-spacing:.14em;
      color:#8b7d70;
    }

    .rsvp{
      margin-top:18px;
      padding:16px 14px 14px;
      border-radius:24px;
      border:1px solid rgba(185,151,109,.24);
      background:rgba(255,255,255,.42);
    }

    .rsvp-title{
      text-align:center;
      margin:0 0 4px;
      font-family:"Cormorant Garamond",serif;
      font-size:1.86rem;
      text-transform:uppercase;
      letter-spacing:.08em;
      color:#4a3a2d;
    }

    .rsvp-copy{
      text-align:center;
      margin:0 0 14px;
      font-family:"Cormorant Garamond",serif;
      font-size:1.12rem;
      color:#7a6d61;
    }

    .field{ margin-bottom:10px; }
    .field label{
      display:block;
      margin-bottom:6px;
      font-size:.76rem;
      font-weight:600;
      color:#8a7b6d;
      letter-spacing:.14em;
      text-transform:uppercase;
    }

    .field input,.field select,.field textarea{
      width:100%;
      border:1px solid rgba(185,151,109,.20);
      background:#fffdf9;
      border-radius:16px;
      padding:13px 14px;
      color:var(--ink);
      font:inherit;
      outline:none;
    }

    .field textarea{
      min-height:96px;
      resize:vertical;
    }

    .status{
      text-align:center;
      min-height:22px;
      margin-top:10px;
      color:#8b7b6a;
      font-size:.9rem;
    }

    .foot{
      margin-top:10px;
      text-align:center;
      font-size:.84rem;
      line-height:1.7;
      color:#8b7b6a;
    }

    .footer-sign{
      margin-top:16px;
      text-align:center;
      font-family:"Cormorant Garamond",serif;
      font-size:1rem;
      letter-spacing:.18em;
      color:#8a755b;
      text-transform:uppercase;
    }

    audio{display:none}

    @media (max-width:430px){
      .page{padding-inline:10px}
      .preview-card{inset:15px 18px 17px}
      .envelope.open .preview-card{transform:translateY(-80px)}
      .details{gap:8px}
      .detail{padding-inline:4px}
      .music{gap:10px}
      .track-title{font-size:1.14rem}
    }
  </style>
</head>

  <div class="ambient"></div>

  <script>
    const INVITE = {
      groom: "Islam",

      musicTitle: "Our Song",
      musicArtist: "Play the soundtrack of our evening",
      rsvpTitle: "RSVP",
      rsvpCopy: "A gentle note of confirmation would mean so much to us."
    };
  </script>

  <div class="page">
    <section class="hero">
      <div class="shell">
        <section class="cover" id="cover">
          <div class="ornament"><span>✦</span></div>
          <div class="guest-chip" id="guestChip">Wedding Invitation</div>
          <h1 class="eyebrow" id="heroTitle"></h1>

          <div class="envelope-wrap">
            <div class="envelope" id="envelope" tabindex="0" role="button" aria-label="Open invitation">
              <div class="env-back"></div>
              <div class="preview-card">
                <div class="preview-photo" id="previewPhoto"></div>
              </div>
              <div class="env-front"></div>
              <div class="env-flap"></div>

            </div>
          </div>

          <div class="sub-note">Press the envelope to reveal the invitation</div>

        <section class="panel" id="panel">
          <div class="paper">
            <div class="frame">
              <div class="reveal">
                <div class="family-line" id="familyLine"></div>

              <div class="reveal">
                <div class="names">
                  <div class="script" id="coupleNames"></div>
                </div>
              </div>

              <div class="reveal">
                <div class="copy" id="inviteCopy"></div>
              </div>

              <div class="reveal">
                <div class="hero-photo">
                  <img id="mainPhoto" src="couple.jpg" alt="Islam and Mayar">
                </div>
              </div>

              <div class="reveal">
                <div class="details">
                  <div class="detail">
                    <div class="detail-icon">✦</div>
                    <div class="detail-main" id="dateText"></div>
                    <div class="detail-sub" id="weekdayText"></div>
                  </div>
                  <div class="detail">
                    <div class="detail-icon">◷</div>
                    <div class="detail-main" id="timeText"></div>
                    <div class="detail-sub" id="timeSubText"></div>
                  </div>
                  <div class="detail">
                    <div class="detail-icon">⌂</div>
                    <div class="detail-main" id="venueText"></div>
                    <div class="detail-sub" id="venueSubText"></div>
                  </div>
                </div>
              </div>

              <div class="reveal"><div class="divider"><span>✦</span></div></div>

              <div class="reveal">
                <div class="btns">
                  <a class="btn btn-gold" id="locationBtn" target="_blank" rel="noopener noreferrer"></a>
                  <a class="btn btn-soft" href="#rsvpSection" id="rsvpAnchorBtn"></a>
                </div>
              </div>

              <div class="reveal">
                <div class="music">
                  <button class="play-btn" id="playBtn" aria-label="Play music">▶</button>
                  <div class="track">
                    <div class="track-title" id="musicTitle"></div>
                    <div class="track-sub" id="musicArtist"></div>
                    <div class="progress"><div class="progress-fill" id="progressFill"></div></div>
                  </div>
                  <button class="volume" id="muteBtn" aria-label="Mute music">🔊</button>
                </div>
              </div>

              <div class="reveal">
                <div class="countdown">
                  <div class="count">
                    <div class="count-num" id="days">00</div>
                    <div class="count-label">Days</div>
                  </div>
                  <div class="count">
                    <div class="count-num" id="hours">00</div>
                    <div class="count-label">Hours</div>
                  </div>
                  <div class="count">
                    <div class="count-num" id="minutes">00</div>
                    <div class="count-label">Minutes</div>
                  </div>
                  <div class="count">
                    <div class="count-num" id="seconds">00</div>
                    <div class="count-label">Seconds</div>
                  </div>
                </div>
              </div>

              <div class="reveal">
                <div class="rsvp" id="rsvpSection">
                  <h2 class="rsvp-title" id="rsvpTitle"></h2>
                  <p class="rsvp-copy" id="rsvpCopy"></p>

                  <div class="field">
                    <label for="guestName">Guest Name</label>
                    <input id="guestName" type="text" placeholder="Enter your name" />
                  </div>

                  <div class="field">
                    <label for="attendance">Attendance</label>
                    <select id="attendance">
                      <option value="With joy, I will be attending">With joy, I will be attending</option>
                      <option value="With warm wishes, I regret that I cannot attend">With warm wishes, I cannot attend</option>
                    </select>
                  </div>

                  <div class="field">
                    <label for="guests">Number of Guests</label>
                    <select id="guests">
                      <option value="1">1 Guest</option>
                      <option value="2">2 Guests</option>
                      <option value="3">3 Guests</option>
                      <option value="4">4 Guests</option>
                    </select>
                  </div>

                  <div class="field">
                    <label for="message">A Note for the Couple</label>
                    <textarea id="message" placeholder="Leave a lovely note"></textarea>
                  </div>

                  <button class="btn btn-gold" id="rsvpSubmit"></button>
                  <div class="status" id="status"></div>
                  <div class="foot">This invitation works as a real website. Keep the files together: HTML + couple.jpg + music.mp3.</div>
                </div>
              </div>

              <div class="reveal footer-sign">Islam &amp; Mayar</div>
            </div>
          </div>
        </section>
      </div>
    </section>
  </div>

  <audio id="audio" preload="auto" loop></audio>

  <script>
    const $ = (id) => document.getElementById(id);
    const envelope = $("envelope");
    const cover = $("cover");
    const panel = $("panel");
    const audio = $("audio");
    const playBtn = $("playBtn");
    const muteBtn = $("muteBtn");
    const progressFill = $("progressFill");

    function getGuestFromUrl(){
      const params = new URLSearchParams(window.location.search);
      const guest = params.get("guest");
      return guest ? decodeURIComponent(guest.replace(/\+/g, " ")) : "";
    }

    function initContent(){
      $("heroTitle").textContent = INVITE.heroTitle;
      $("openText").textContent = INVITE.openText;
      $("familyLine").textContent = INVITE.familyLine;
      $("coupleNames").textContent = `${INVITE.groom} & ${INVITE.bride}`;
      $("inviteCopy").textContent = INVITE.inviteCopy;
      $("dateText").textContent = INVITE.dateText;
      $("weekdayText").textContent = INVITE.weekdayText;
      $("timeText").textContent = INVITE.timeText;
      $("timeSubText").textContent = INVITE.timeSubText;
      $("venueText").textContent = INVITE.venueText;
      $("venueSubText").textContent = INVITE.venueSubText;
      $("locationBtn").textContent = INVITE.locationButton;
      $("rsvpAnchorBtn").textContent = INVITE.rsvpButton;
      $("musicTitle").textContent = INVITE.musicTitle;
      $("musicArtist").textContent = INVITE.musicArtist;
      $("rsvpTitle").textContent = INVITE.rsvpTitle;
      $("rsvpCopy").textContent = INVITE.rsvpCopy;
      $("rsvpSubmit").textContent = INVITE.rsvpButton;
      $("locationBtn").href = INVITE.locationUrl;

      $("mainPhoto").src = INVITE.couplePhotoFile;
      $("previewPhoto").style.backgroundImage =
        `linear-gradient(180deg, rgba(255,255,255,.08), rgba(0,0,0,.04)), url('${INVITE.couplePhotoFile}')`;

      audio.src = INVITE.songFile;

      const guest = getGuestFromUrl();
      if(guest){
        $("guestChip").textContent = `For ${guest}`;
        $("guestName").value = guest;
      }
    }

    function revealItems(){
      const items = document.querySelectorAll(".reveal");
      items.forEach((item, index) => {
        setTimeout(() => item.classList.add("show"), 120 * index);
      });
    }

    async function playMusic(){
      try{
        audio.volume = 0.55;
        audio.muted = false;
        await audio.play();
        playBtn.textContent = "❚❚";
        muteBtn.textContent = "🔊";
      }catch(e){}
    }

    function openInvitation(){
      if(envelope.classList.contains("open")) return;
      envelope.classList.add("open");

      setTimeout(() => {
        cover.classList.add("hidden");
        panel.classList.add("show");
        revealItems();
      }, 700);

      setTimeout(() => {
        panel.scrollIntoView({ behavior:"smooth", block:"start" });
      }, 1100);

      playMusic();
    }

    envelope.addEventListener("click", openInvitation);
    envelope.addEventListener("keydown", (e) => {
      if(e.key === "Enter" || e.key === " "){
        e.preventDefault();
        openInvitation();
      }
    });

    playBtn.addEventListener("click", async () => {
      if(audio.paused){
        try{
          await audio.play();
          playBtn.textContent = "❚❚";
        }catch(e){}
      }else{
        audio.pause();
        playBtn.textContent = "▶";
      }
    });

    muteBtn.addEventListener("click", () => {
      audio.muted = !audio.muted;
      muteBtn.textContent = audio.muted ? "🔇" : "🔊";
    });

    audio.addEventListener("timeupdate", () => {
      if(!audio.duration || Number.isNaN(audio.duration)) return;
      progressFill.style.width = `${(audio.currentTime / audio.duration) * 100}%`;
    });

    function pad(num){ return String(num).padStart(2, "0"); }

    function updateCountdown(){
      const target = new Date(INVITE.eventDateISO).getTime();
      const now = Date.now();
      let diff = target - now;
      if(diff < 0) diff = 0;

      const d = Math.floor(diff / (1000 * 60 * 60 * 24));
      const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
      const m = Math.floor((diff / (1000 * 60)) % 60);
      const s = Math.floor((diff / 1000) % 60);

      $("days").textContent = pad(d);
      $("hours").textContent = pad(h);
      $("minutes").textContent = pad(m);
      $("seconds").textContent = pad(s);
    }

    function buildRSVPMessage(){
      const guestName = $("guestName").value.trim() || "Guest";
      const attendance = $("attendance").value;
      const guests = $("guests").value;
      const message = $("message").value.trim();

      return [
        `Wedding RSVP`,
        `For: ${INVITE.groom} & ${INVITE.bride}`,
        `Guest Name: ${guestName}`,
        `Attendance: ${attendance}`,
        `Number of Guests: ${guests}`,
        message ? `Message: ${message}` : ""
      ].filter(Boolean).join("\\n");
    }

    $("rsvpSubmit").addEventListener("click", () => {
      const status = $("status");
      const subject = encodeURIComponent(`RSVP - ${INVITE.groom} & ${INVITE.bride}`);
      const body = encodeURIComponent(buildRSVPMessage());

      if(INVITE.rsvpEmail.trim()){
        window.location.href = `mailto:${INVITE.rsvpEmail}?subject=${subject}&body=${body}`;
        status.textContent = "Opening your email app…";
      }else{
        status.textContent = "Please add your RSVP email in the settings.";
      }
    });

    initContent();
    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
